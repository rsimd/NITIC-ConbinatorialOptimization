# Deploy Jupyter Book (MyST) static site to GitHub Pages.
# Repository: https://github.com/rsimd/NITIC-ConbinatorialOptimization

name: Deploy Jupyter Book

on:
  push:
    branches:
      - master
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install Python dependencies
        run: uv sync --frozen --all-groups

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Build static HTML
        env:
          BASE_URL: /NITIC-ConbinatorialOptimization
        run: uv run jupyter-book build --html --ci

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _build/html

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
